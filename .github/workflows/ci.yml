name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:logic
      - run: npm run test:localization
      - run: npm run test:unit
      - run: npm run lint
      - run: npm run build
      - run: npm run check:committed-secrets
      - run: shellcheck --severity=warning deploy/*.sh scripts/*.sh

  integration:
    needs: [quality]
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: postgresql://quotation_test:quotation_test_only@127.0.0.1:55432/quotation_test
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: docker compose -f docker-compose.test.yml up -d --wait postgres minio
      - run: npm run db:migrate
      - run: npm run test:integration
      - if: always()
        run: docker compose -f docker-compose.test.yml down -v

  container:
    needs: [quality]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - run: docker build --file Dockerfile --tag "quotation-ci:${GITHUB_SHA}" .

  browser_smoke:
    needs: [quality]
    runs-on: ubuntu-24.04
    env:
      DATABASE_URL: postgresql://quotation_test:quotation_test_only@127.0.0.1:55432/quotation_test
      AUTH_SECRET: ci-browser-smoke-only
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: docker compose -f docker-compose.test.yml up -d --wait postgres minio
      - run: npm run db:migrate
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: always()
        run: docker compose -f docker-compose.test.yml down -v

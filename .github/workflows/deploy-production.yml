name: Production Delivery

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: Retained 40-character lowercase release SHA
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: ghcr.io/jeffreycaicai/sales_quotation_approvecenter

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      release_sha: ${{ steps.image.outputs.release_sha }}
      app_image: ${{ steps.image.outputs.app_image }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
      - name: Build and publish the immutable release image
        id: image
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -Eeuo pipefail
          [[ $RELEASE_SHA =~ ^[0-9a-f]{40}$ ]]
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
          tagged_image="$IMAGE_REPOSITORY:$RELEASE_SHA"
          docker build --file Dockerfile \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=$RELEASE_SHA" \
            --tag "$tagged_image" .
          docker push "$tagged_image"
          docker pull "$tagged_image" >/dev/null
          APP_IMAGE=""
          while IFS= read -r candidate; do
            if [[ $candidate =~ ^ghcr\.io/jeffreycaicai/sales_quotation_approvecenter@sha256:[0-9a-f]{64}$ ]]; then
              APP_IMAGE=$candidate
              break
            fi
          done < <(docker image inspect --format '{{range .RepoDigests}}{{println .}}{{end}}' "$tagged_image")
          [[ -n $APP_IMAGE ]]
          printf 'release_sha=%s\napp_image=%s\n' "$RELEASE_SHA" "$APP_IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    needs: [publish]
    runs-on: ubuntu-24.04
    permissions: {}
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
      RELEASE_SHA: ${{ needs.publish.outputs.release_sha }}
      APP_IMAGE: ${{ needs.publish.outputs.app_image }}
    steps:
      - name: Install the CI-approved release by canonical digest
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ $RELEASE_SHA =~ ^[0-9a-f]{40}$ ]]
          [[ $APP_IMAGE =~ ^ghcr\.io/jeffreycaicai/sales_quotation_approvecenter@sha256:[0-9a-f]{64}$ ]]
          [[ $VPS_USER == deploy ]]
          [[ $VPS_HOST =~ ^[A-Za-z0-9.-]+$ ]]
          [[ $VPS_PORT =~ ^[0-9]{1,5}$ ]] && ((VPS_PORT >= 1 && VPS_PORT <= 65535))
          [[ $VPS_HOST_KEY =~ ^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp(256|384|521))[[:space:]][A-Za-z0-9+/=]+$ ]]
          install -d -m 0700 "$RUNNER_TEMP/quotation-ssh"
          key_file="$RUNNER_TEMP/quotation-ssh/id"
          known_hosts="$RUNNER_TEMP/quotation-ssh/known_hosts"
          trap 'rm -f -- "$key_file" "$known_hosts"' EXIT
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$key_file"
          printf '[%s]:%s %s\n' "$VPS_HOST" "$VPS_PORT" "$VPS_HOST_KEY" > "$known_hosts"
          chmod 0600 "$key_file" "$known_hosts"
          ssh -F /dev/null -i "$key_file" -p "$VPS_PORT" \
            -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts" -- "$VPS_USER@$VPS_HOST" \
            /opt/sales-quotation/current/deploy/install-release.sh "$RELEASE_SHA" "$APP_IMAGE"

  rollback:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions: {}
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
      ROLLBACK_SHA: ${{ inputs.rollback_sha }}
    steps:
      - name: Roll back to a retained validated release
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ $ROLLBACK_SHA =~ ^[0-9a-f]{40}$ ]]
          [[ $VPS_USER == deploy ]]
          [[ $VPS_HOST =~ ^[A-Za-z0-9.-]+$ ]]
          [[ $VPS_PORT =~ ^[0-9]{1,5}$ ]] && ((VPS_PORT >= 1 && VPS_PORT <= 65535))
          [[ $VPS_HOST_KEY =~ ^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp(256|384|521))[[:space:]][A-Za-z0-9+/=]+$ ]]
          install -d -m 0700 "$RUNNER_TEMP/quotation-ssh"
          key_file="$RUNNER_TEMP/quotation-ssh/id"
          known_hosts="$RUNNER_TEMP/quotation-ssh/known_hosts"
          trap 'rm -f -- "$key_file" "$known_hosts"' EXIT
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$key_file"
          printf '[%s]:%s %s\n' "$VPS_HOST" "$VPS_PORT" "$VPS_HOST_KEY" > "$known_hosts"
          chmod 0600 "$key_file" "$known_hosts"
          ssh -F /dev/null -i "$key_file" -p "$VPS_PORT" \
            -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts" -- "$VPS_USER@$VPS_HOST" \
            /opt/sales-quotation/current/deploy/rollback.sh "$ROLLBACK_SHA"

name: Production Delivery

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: Retained 40-character lowercase release SHA
        required: true
        type: string

permissions: {}

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  resolve_image:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      packages: read
    outputs:
      release_sha: ${{ steps.manifest.outputs.release_sha }}
      app_image: ${{ steps.manifest.outputs.app_image }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-manifest-${{ github.event.workflow_run.head_sha }}-${{ github.event.workflow_run.id }}
          path: ${{ runner.temp }}/release-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate the run-bound manifest
        id: manifest
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          EXPECTED_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -Eeuo pipefail
          manifest="$RUNNER_TEMP/release-manifest/release.manifest"
          scripts/validate-release-manifest.sh "$manifest" "$EXPECTED_SHA" "$EXPECTED_RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Pull and verify the validated digest
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ steps.manifest.outputs.release_sha }}
          APP_IMAGE: ${{ steps.manifest.outputs.app_image }}
        run: |
          set -Eeuo pipefail
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
          docker pull "$APP_IMAGE" >/dev/null
          revision=$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$APP_IMAGE")
          [[ $revision == "$RELEASE_SHA" ]]

  deploy:
    needs: [resolve_image]
    runs-on: ubuntu-24.04
    permissions: {}
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
      RELEASE_SHA: ${{ needs.resolve_image.outputs.release_sha }}
      APP_IMAGE: ${{ needs.resolve_image.outputs.app_image }}
    steps:
      - name: Install the CI-approved release by canonical digest
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ $RELEASE_SHA =~ ^[0-9a-f]{40}$ ]]
          [[ $APP_IMAGE =~ ^ghcr\.io/jeffreycaicai/sales_quotation_approvecenter@sha256:[0-9a-f]{64}$ ]]
          [[ $VPS_USER == deploy ]]
          [[ $VPS_HOST =~ ^[A-Za-z0-9.-]+$ ]]
          [[ $VPS_PORT =~ ^[0-9]{1,5}$ ]] && ((VPS_PORT >= 1 && VPS_PORT <= 65535))
          [[ $VPS_HOST_KEY =~ ^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp(256|384|521))[[:space:]][A-Za-z0-9+/=]+$ ]]
          install -d -m 0700 "$RUNNER_TEMP/quotation-ssh"
          key_file="$RUNNER_TEMP/quotation-ssh/id"
          known_hosts="$RUNNER_TEMP/quotation-ssh/known_hosts"
          trap 'rm -f -- "$key_file" "$known_hosts"' EXIT
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$key_file"
          if ((VPS_PORT == 22)); then
            printf '%s %s\n' "$VPS_HOST" "$VPS_HOST_KEY" > "$known_hosts"
          else
            printf '[%s]:%s %s\n' "$VPS_HOST" "$VPS_PORT" "$VPS_HOST_KEY" > "$known_hosts"
          fi
          chmod 0600 "$key_file" "$known_hosts"
          ssh -F /dev/null -i "$key_file" -p "$VPS_PORT" \
            -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts" -- "$VPS_USER@$VPS_HOST" \
            /opt/sales-quotation/current/deploy/install-release.sh "$RELEASE_SHA" "$APP_IMAGE"

  rollback:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions: {}
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
      ROLLBACK_SHA: ${{ inputs.rollback_sha }}
    steps:
      - name: Roll back to a retained validated release
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ $ROLLBACK_SHA =~ ^[0-9a-f]{40}$ ]]
          [[ $VPS_USER == deploy ]]
          [[ $VPS_HOST =~ ^[A-Za-z0-9.-]+$ ]]
          [[ $VPS_PORT =~ ^[0-9]{1,5}$ ]] && ((VPS_PORT >= 1 && VPS_PORT <= 65535))
          [[ $VPS_HOST_KEY =~ ^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp(256|384|521))[[:space:]][A-Za-z0-9+/=]+$ ]]
          install -d -m 0700 "$RUNNER_TEMP/quotation-ssh"
          key_file="$RUNNER_TEMP/quotation-ssh/id"
          known_hosts="$RUNNER_TEMP/quotation-ssh/known_hosts"
          trap 'rm -f -- "$key_file" "$known_hosts"' EXIT
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > "$key_file"
          if ((VPS_PORT == 22)); then
            printf '%s %s\n' "$VPS_HOST" "$VPS_HOST_KEY" > "$known_hosts"
          else
            printf '[%s]:%s %s\n' "$VPS_HOST" "$VPS_PORT" "$VPS_HOST_KEY" > "$known_hosts"
          fi
          chmod 0600 "$key_file" "$known_hosts"
          ssh -F /dev/null -i "$key_file" -p "$VPS_PORT" \
            -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=yes \
            -o "UserKnownHostsFile=$known_hosts" -- "$VPS_USER@$VPS_HOST" \
            /opt/sales-quotation/current/deploy/rollback.sh "$ROLLBACK_SHA"
